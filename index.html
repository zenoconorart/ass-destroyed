<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Assdestroyed</title>
<style>
  body { margin:0; font-family:sans-serif; background:#000; color:#fff; }
  #game { display:block; margin:0 auto; background:#000; touch-action:none; }
  #hud { position:absolute; top:5px; left:5px; font-size:20px; }
  #lives { position:absolute; top:5px; right:5px; font-size:24px; }
  #muteBtn {
    position:absolute;
    left:50%;
    top:10px;
    transform:translateX(-50%);
    cursor:pointer;
    user-select:none;
  }
  #muteBtn.mobile {
    position:relative;
    left:auto;
    top:auto;
    transform:none;
    width:70px;
    height:70px;
    font-size:28px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-left:10px; margin-right:40px;
  }
  #muteBtn:focus { outline:none; }
  #overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); color:#fff; display:none; align-items:center; justify-content:center; flex-direction:column; }
  #scoreboard { margin-top:10px; }
  button { margin-top:5px; }
  #controlPanel {
    position:fixed;
    left:0;
    right:0;
    bottom:40px;
    display:none;
    justify-content:center;
  }
  #controls {
    position:relative;
    width:260px;
    height:260px;
  }
  #controls button {
    position:absolute;
    width:70px;
    height:70px;
    font-size:28px;
  }
  #controls button:focus { outline:none; }
  #leftBtn { left:0; top:95px; }
  #rightBtn { right:0; top:95px; }
  #upBtn { left:95px; top:0; }
  #downBtn { left:95px; bottom:0; }
  #fireBtn {
    left:95px;
    top:95px;
    width:90px;
    height:90px;
    background:red;
    color:#fff;
    border-radius:50%;
    font-size:32px;
  }

  @media (pointer: coarse) {
    #controls {
      width:420px;
      height:420px;
    }
    #controls button {
      width:120px;
      height:120px;
      font-size:48px;
    }
    #leftBtn { top:160px; }
    #rightBtn { top:160px; }
    #upBtn { left:160px; }
    #downBtn { left:160px; }
    #fireBtn {
      width:160px;
      height:160px;
      font-size:64px;
      left:160px;
      top:160px;
    }
    #muteBtn.mobile {
      width:120px;
      margin-left:10px;
      margin-right:40px;
      height:120px;
      font-size:48px;
    }
  }
</style>
</head>
<body>
<canvas id="game" width="800" height="600"></canvas>
<div id="hud"></div>
<div id="lives"></div>
<div id="muteBtn" tabindex="0">🔔</div>
<div id="overlay">
  <div id="final"></div>
  <input id="nameInput" placeholder="Your name">
  <button id="submitBtn">Submit</button>
  <div id="scoreboard"></div>
</div>
<div id="controlPanel">
  <div id="controls">
    <button id="leftBtn">⬅️</button>
    <button id="rightBtn">➡️</button>
    <button id="upBtn">⬆️</button>
    <button id="downBtn">⬇️</button>
    <button id="fireBtn">🔴</button>
  </div>
</div>
<script>
(() => {
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const livesDiv = document.getElementById('lives');
const overlay = document.getElementById('overlay');
const finalDiv = document.getElementById('final');
const nameInput = document.getElementById('nameInput');
const submitBtn = document.getElementById('submitBtn');
const scoreboardDiv = document.getElementById('scoreboard');
const muteBtn = document.getElementById('muteBtn');
const controlPanel = document.getElementById('controlPanel');
const controlsDiv = document.getElementById('controls');

let width = canvas.width;
let height = canvas.height;
let keys = {};
let bullets = [];
let peaches = [];
let explosions = [];
let stars = [];
let level = 1;
let score = 0;
let lives = 3;
let startTime = Date.now();
let gameOver = false;
let mute = false;

const scale = window.matchMedia('(pointer: coarse)').matches ||
  /Mobi|Android|iP(ad|hone)/.test(navigator.userAgent) ? 1.8 : 1;

const isMobile = scale > 1;
if(isMobile){
  controlPanel.style.display = 'flex';
  controlPanel.style.alignItems = 'center';
  controlPanel.insertBefore(muteBtn, controlPanel.firstChild);
  muteBtn.classList.add('mobile');
  function resize(){
    const panelH = controlPanel.offsetHeight || 0;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - panelH - 20;
    canvas.style.width = canvas.width + 'px';
    canvas.style.height = canvas.height + 'px';
    width = canvas.width;
    height = canvas.height;
    initStars();
  }
  window.addEventListener('resize',resize);
  resize();
  controlsDiv.style.display = 'block';
  document.body.style.touchAction = 'none';
}

function initStars(count=100){
  stars=[];
  for(let i=0;i<count;i++){
    stars.push({x:Math.random()*width,y:Math.random()*height,phase:Math.random()*Math.PI*2});
  }
}

// Audio
const AudioCtx = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioCtx();

function playTone(freq, duration, volume=0.3, type='sine') {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = volume;
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

let engineOsc = null;
function startEngine(back=false) {
  if(!engineOsc){
    engineOsc = audioCtx.createOscillator();
    engineOsc.type = 'sawtooth';
    const gain = audioCtx.createGain();
    gain.gain.value = 0.05;
    engineOsc.connect(gain).connect(audioCtx.destination);
    engineOsc.start();
  }
  engineOsc.frequency.value = back ? 80 : 100;
}
function stopEngine() {
  if(engineOsc) { engineOsc.stop(); engineOsc=null; }
}

let musicInterval = null;
function startMusic() {
  if(mute) return;
  if(musicInterval) return;
  const notes = [220.0, 246.9, 261.6, 293.7];
  let i=0;
  musicInterval = setInterval(()=>{
    playTone(notes[i%notes.length],0.4,0.08,'triangle');
    i++;
  },600);
}
function stopMusic() {
  clearInterval(musicInterval); musicInterval=null;
}

function bulletSound(){ playTone(880,0.1,0.2); }
function fartSound(){ playTone(220,0.2,0.3,'square'); }
function crashSound(){ playTone(110,0.5,0.5,'sawtooth'); }
function levelJingle(){
  playTone(660,0.3,0.3);
  setTimeout(()=>playTone(880,0.3,0.3),300);
}
function victoryJingle(){
  playTone(523.2,0.3,0.3);
  setTimeout(()=>playTone(659.2,0.3,0.3),300);
  setTimeout(()=>playTone(783.9,0.4,0.3),600);
}

// Game objects
class Player {
  constructor(){
    this.x = width/2; this.y = height/2;
    this.angle = 0; this.vx=0; this.vy=0;
  }
  update(){
    if(keys['ArrowLeft']) this.angle -= 0.05;
    if(keys['ArrowRight']) this.angle += 0.05;
    if(keys['ArrowUp']) {
      this.vx += Math.cos(this.angle)*0.1;
      this.vy += Math.sin(this.angle)*0.1;
      startEngine(false);
    } else if(keys['ArrowDown']) {
      this.vx -= Math.cos(this.angle)*0.05;
      this.vy -= Math.sin(this.angle)*0.05;
      startEngine(true);
    } else {
      stopEngine();
    }
    this.vx*=0.99; this.vy*=0.99;
    this.x += this.vx; this.y += this.vy;
    if(this.x<0) this.x+=width; if(this.x>width) this.x-=width;
    if(this.y<0) this.y+=height; if(this.y>height) this.y-=height;
  }
  draw(){
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.angle);
    ctx.font=`${30*scale}px serif`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('🍆',0,0);
    ctx.restore();
  }
}
const player = new Player();

class Peach {
  constructor(x,y,size,stage,speedMul=1){
    this.x=x; this.y=y; this.size=size*scale; this.stage=stage; // stage: 2 big,1 normal,0 small
    const angle=Math.random()*Math.PI*2; const speed=(1+Math.random()*1.5)*speedMul;
    this.vx=Math.cos(angle)*speed; this.vy=Math.sin(angle)*speed;
  }
  update(){
    this.x+=this.vx; this.y+=this.vy;
    if(this.x<0) this.x+=width; if(this.x>width) this.x-=width;
    if(this.y<0) this.y+=height; if(this.y>height) this.y-=height;
  }
  draw(){
    ctx.font=`${this.size}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🍑',this.x,this.y);
  }
}

class Bullet {
  constructor(x,y,angle){
    this.x=x; this.y=y; this.angle=angle; this.life=0;
    const speed=5; this.vx=Math.cos(angle)*speed; this.vy=Math.sin(angle)*speed;
  }
  update(){
    this.x+=this.vx; this.y+=this.vy; this.life+=1;
    if(this.x<0||this.x>width||this.y<0||this.y>height||this.life>100) this.dead=true;
  }
  draw(){
    ctx.font=`${20*scale}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('💦',this.x,this.y);
  }
}

function spawnPeaches(){
  peaches=[];
  let count = level + 3; // 4,5,6
  let speedMul = 1;
  if(level===1){ count += 2; speedMul = 1.2; }
  for(let i=0;i<count;i++){
    peaches.push(new Peach(
      Math.random()*width,
      Math.random()*height,
      level>1?60:40,
      level>1?2:1,
      speedMul
    ));
  }
}

function splitPeach(peach){
  if(peach.stage>1){
    peaches.push(new Peach(peach.x,peach.y,40,1));
    peaches.push(new Peach(peach.x,peach.y,40,1));
  }else if(peach.stage===1 && level>=3){
    for(let i=0;i<3;i++) peaches.push(new Peach(peach.x,peach.y,20,0));
  }
}

function explode(x,y,count=5){
  for(let i=0;i<count;i++) {
    const angle = Math.random()*Math.PI*2;
    const speed = Math.random()*3+1;
    explosions.push({
      x,
      y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      life:0,
      max:30
    });
  }
}

function updateStars(){
  stars.forEach(s=>{ s.phase += 0.05 + Math.random()*0.02; });
}
function drawStars(){
  stars.forEach(s=>{
    const alpha = 0.5 + Math.sin(s.phase)*0.5;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fillRect(s.x,s.y,2,2);
  });
  ctx.fillStyle = '#fff';
}

function updateExplosions(){
  explosions=explosions.filter(ex=>ex.life<ex.max);
  explosions.forEach(ex=>{ ex.x+=ex.vx; ex.y+=ex.vy; ex.life++; });
}
function drawExplosions(){
  ctx.font=`${15*scale}px serif`;
  explosions.forEach(ex=>{
    ctx.globalAlpha = 1 - ex.life/ex.max;
    ctx.fillText('💩',ex.x,ex.y);
  });
  ctx.globalAlpha = 1;
}

function checkCollisions(){
  peaches.forEach((p,pi)=>{
    bullets.forEach((b,bi)=>{
      const dx=p.x-b.x, dy=p.y-b.y; const dist=Math.hypot(dx,dy);
      if(dist<p.size/2){ bullets.splice(bi,1); fartSound(); score+=10; explode(p.x,p.y); splitPeach(p); peaches.splice(pi,1); }
    });
    const dxp=p.x-player.x, dyp=p.y-player.y; const distp=Math.hypot(dxp,dyp);
    if(distp < p.size/2 + 15*scale){ crash(); }
  });
}

function crash(){
  crashSound();
  explode(player.x, player.y, 20);
  stopEngine();
  lives--; if(lives<=0){ endGame(); } else { player.x=width/2; player.y=height/2; player.vx=player.vy=0; }
}

function update(){
  if(gameOver) return;
  ctx.clearRect(0,0,width,height);
  updateStars();
  drawStars();
  player.update();
  bullets.forEach(b=>b.update());
  bullets=bullets.filter(b=>!b.dead);
  peaches.forEach(p=>p.update());
  updateExplosions();
  checkCollisions();

  player.draw();
  peaches.forEach(p=>p.draw());
  bullets.forEach(b=>b.draw());
  drawExplosions();

  hud.textContent=`Level ${level} | Score ${score} | Time ${((Date.now()-startTime)/1000).toFixed(1)}s`;
  livesDiv.textContent='🍆'.repeat(lives);

  if(peaches.length===0){
    levelJingle();
    level++;
    if(level>3){ endGame(); return; }
    spawnPeaches();
  }
  requestAnimationFrame(update);
}

function endGame(){
  gameOver=true;
  stopMusic();
  stopEngine();
  const t = ((Date.now()-startTime)/1000).toFixed(1);
  const completed = level>3;
  if(completed) {
    victoryJingle();
    finalDiv.textContent=`Game Completed! Time: ${t}s  Score: ${score}`;
  } else {
    finalDiv.textContent=`Game Over! Time: ${t}s  Score: ${score}`;
  }
  overlay.style.display='flex';
}

function startGame(){
  level=1; score=0; lives=3; gameOver=false; startTime=Date.now();
  player.x=width/2; player.y=height/2; player.vx=player.vy=0; bullets=[]; explosions=[];
  stopEngine();
  initStars();
  spawnPeaches();
  overlay.style.display='none'; startMusic(); update();
}

document.addEventListener('keydown',e=>{ keys[e.key]=true; if(e.key===' '&&bullets.length<8&&!gameOver){ bullets.push(new Bullet(player.x,player.y,player.angle)); bulletSound(); } });
document.addEventListener('keyup',e=>{ keys[e.key]=false; });

if(isMobile){
  function bind(btnId,key,fire){
    const btn=document.getElementById(btnId);
    btn.addEventListener('touchstart',e=>{e.preventDefault(); if(fire){ if(bullets.length<8&&!gameOver){ bullets.push(new Bullet(player.x,player.y,player.angle)); bulletSound(); }} else { keys[key]=true; }});
    if(!fire) btn.addEventListener('touchend',e=>{e.preventDefault(); keys[key]=false;});
  }
  bind('leftBtn','ArrowLeft');
  bind('rightBtn','ArrowRight');
  bind('upBtn','ArrowUp');
  bind('downBtn','ArrowDown');
  bind('fireBtn',' ',true);
}

muteBtn.addEventListener('click',()=>{
  mute=!mute; muteBtn.textContent=mute?'🔕':'🔔'; muteBtn.blur(); if(mute) stopMusic(); else startMusic(); });
submitBtn.addEventListener('click',()=>{
  const name = nameInput.value || 'Anon';
  const time = parseFloat(((Date.now()-startTime)/1000).toFixed(1));
  const lvl = Math.min(level,3);
  let scores = JSON.parse(localStorage.getItem('scores')||'[]');
  scores.push({name, time, score, level:lvl});
  scores = sortScores(scores).slice(0,10);
  localStorage.setItem('scores', JSON.stringify(scores));
  displayScores(scores);
  startGame();
});

function sortScores(arr){
  return arr.sort((a,b)=>{
    const aComp = a.level >= 3;
    const bComp = b.level >= 3;
    if(aComp && bComp){
      if(a.time !== b.time) return a.time - b.time;
      return (b.score||0) - (a.score||0);
    }
    if(aComp) return -1;
    if(bComp) return 1;
    if((a.score||0) !== (b.score||0)) return (b.score||0) - (a.score||0);
    if(a.level !== b.level) return b.level - a.level;
    return a.time - b.time;
  });
}

function displayScores(scores){
  const top = scores.slice(0,10);
  scoreboardDiv.innerHTML = '<h3>Scoreboard</h3>' + top.map(s => {
    const time = s.time.toFixed ? s.time.toFixed(1) : s.time;
    return `${s.name}: Level ${s.level} - ${time}s - ${s.score} pts`;
  }).join('<br>');
}

window.addEventListener('load',()=>{
  let scores = JSON.parse(localStorage.getItem('scores')||'[]');
  scores = sortScores(scores).slice(0,10);
  displayScores(scores);
  startGame();
});
})();
</script>
</body>
</html>
